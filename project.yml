name: GeigerLens
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.GeigerLens
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  GeigerLens:
    type: application
    platform: iOS
    sources: [GeigerLens]
    settings:
      base:
        INFOPLIST_FILE: GeigerLens/Info.plist
        PRODUCT_NAME: GeigerLens
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: GeigerLens/Info.plist
      properties:
        CFBundleName: GeigerLens
        CFBundleDisplayName: ガイガーレンズ
        CFBundleDevelopmentRegion: ja
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "背面カメラのセンサーで放射線（ガンマ線）由来の輝点を検出するためにカメラを使用します。映像の保存や送信は行いません。"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
